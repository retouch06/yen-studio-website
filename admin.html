<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Prime Touch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>body{margin:0;background:#0D0D0D}
#lockScreen{position:fixed;inset:0;background:#0D0D0D;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'Inter',sans-serif}
#lockScreen.hidden{display:none}
.lock-box{width:320px;text-align:center}
.lock-logo{font-family:'Playfair Display',serif;font-size:24px;color:#F0EDE8;margin-bottom:8px}
.lock-logo span{color:#C9A96E}
.lock-sub{font-size:13px;color:#888580;margin-bottom:28px}
.lock-input{width:100%;background:#161616;border:1px solid #2A2A2A;border-radius:8px;padding:12px 16px;color:#F0EDE8;font-size:14px;outline:none;text-align:center;letter-spacing:0.1em;box-sizing:border-box}
.lock-input:focus{border-color:#C9A96E}
.lock-btn{width:100%;background:#C9A96E;color:#0D0D0D;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px;font-family:inherit}
.lock-btn:hover{background:#E8C98A}
.lock-error{color:#E07856;font-size:12px;margin-top:10px;height:14px}
</style>
</head>
<body>
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-logo">Prime<span>.</span>Touch</div>
    <div class="lock-sub">Enter admin password to continue</div>
    <input type="password" id="pwInput" class="lock-input" placeholder="Password" autofocus>
    <button class="lock-btn" onclick="checkPassword()">Unlock</button>
    <div class="lock-error" id="pwError"></div>
  </div>
</div>
<div id="root"></div>
<script>
  const ADMIN_PASSWORD = "primetouch2026";
  const SESSION_KEY = "pt_admin_unlocked";

  function checkPassword(){
    const val = document.getElementById('pwInput').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, "1");
      document.getElementById('lockScreen').classList.add('hidden');
    } else {
      document.getElementById('pwError').textContent = "Incorrect password";
      document.getElementById('pwInput').value = "";
    }
  }
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });
  if (sessionStorage.getItem(SESSION_KEY) === "1") {
    document.getElementById('lockScreen').classList.add('hidden');
  }
</script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const SUPABASE_URL = "https://lrkmmjcqsfyqiijwuwgb.supabase.co";
const SUPABASE_KEY = "sb_publishable_-ciMTY5GQVZa5VG1zGm4cQ_GJ-nO5Dg";

// Minimal REST client for Supabase's PostgREST API — no SDK needed, avoids all bundler/module conflicts.
const db = {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
  },
  async select(table, query = '') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*${query}`, { headers: this.headers });
    if (!res.ok) return { data: null, error: await res.text() };
    return { data: await res.json(), error: null };
  },
  async insert(table, rows) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...this.headers, Prefer: 'return=representation' },
      body: JSON.stringify(rows),
    });
    if (!res.ok) return { data: null, error: await res.text() };
    return { data: await res.json(), error: null };
  },
  async update(table, id, patch) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...this.headers, Prefer: 'return=representation' },
      body: JSON.stringify(patch),
    });
    if (!res.ok) return { data: null, error: await res.text() };
    return { data: await res.json(), error: null };
  },
  async remove(table, id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: this.headers,
    });
    if (!res.ok) return { error: await res.text() };
    return { error: null };
  },
};

const STATUS = {
  new: { label: 'New', color: '#7C9CBF', bg: 'rgba(124,156,191,0.12)' },
  in_progress: { label: 'In progress', color: '#C9A96E', bg: 'rgba(201,169,110,0.12)' },
  review: { label: 'Review', color: '#B07FD4', bg: 'rgba(176,127,212,0.12)' },
  done: { label: 'Done', color: '#7FBF8C', bg: 'rgba(127,191,140,0.12)' },
  delivered: { label: 'Delivered', color: '#888580', bg: 'rgba(136,133,128,0.12)' },
};

const SERVICE_TYPES = ['Portrait retouching', 'Product photography', 'Fashion & beauty', 'Color grading', 'Batch processing', 'Composite & creative'];

const seedOrders = () => [
  { id: 'ORD-1001', client: 'Linh Nguyen', email: 'linh.nguyen@example.com', service: 'Portrait retouching', photos: 45, price: 225, status: 'in_progress', deadline: daysFromNow(2), created: daysAgo(3), notes: 'Wedding photos, natural skin tone, soft warm tones' },
  { id: 'ORD-1002', client: 'Minh Tran', email: 'minh@shopvn.com', service: 'Product photography', photos: 120, price: 144, status: 'new', deadline: daysFromNow(5), created: daysAgo(1), notes: 'Skincare bottles, white background, ecommerce ready' },
  { id: 'ORD-1003', client: 'Thanh Phuong', email: 'thanh@fashionbrand.vn', service: 'Fashion & beauty', photos: 30, price: 240, status: 'review', deadline: daysFromNow(1), created: daysAgo(6), notes: 'Summer lookbook, editorial color grade' },
  { id: 'ORD-1004', client: 'Sarah Johnson', email: 'sarah.j@gmail.com', service: 'Product photography', photos: 18, price: 36, status: 'done', deadline: daysAgo(1), created: daysAgo(8), notes: 'Jewelry collection, jewel tones, studio white bg' },
  { id: 'ORD-1005', client: 'David Kim', email: 'dkim@agency.co', service: 'Batch processing', photos: 200, price: 480, status: 'delivered', deadline: daysAgo(5), created: daysAgo(14), notes: 'Corporate headshots batch, consistent lighting' },
];

function daysFromNow(n) { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); }
function fmtDate(s) { const d = new Date(s + 'T00:00:00'); return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function daysUntil(s) { const d = new Date(s + 'T00:00:00'); const now = new Date(); now.setHours(0,0,0,0); return Math.round((d - now) / 86400000); }
function App() {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('orders');
  const [statusFilter, setStatusFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [showNewOrder, setShowNewOrder] = useState(false);
  const [toast, setToast] = useState(null);

  async function loadOrders() {
    setLoading(true);
    const { data, error } = await db.select('orders', '&order=inserted_at.desc');
    if (error) {
      showToast('Failed to load orders');
      console.error(error);
    } else if (data.length === 0) {
      // First run: seed with sample data so the dashboard isn't empty
      const seeds = seedOrders();
      await db.insert('orders', seeds);
      setOrders(seeds);
    } else {
      setOrders(data);
    }
    setLoading(false);
  }

  useEffect(() => { loadOrders(); }, []);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  }

  async function updateStatus(id, status) {
    setOrders(prev => prev.map(o => o.id === id ? { ...o, status } : o));
    const { error } = await db.update('orders', id, { status });
    if (error) { showToast('Failed to update'); console.error(error); }
    else showToast(`Marked as ${STATUS[status].label}`);
  }

  async function addOrder(order) {
    const newId = 'ORD-' + (1000 + orders.length + Math.floor(Math.random() * 900));
    const newOrder = { ...order, id: newId, created: new Date().toISOString().slice(0, 10), status: 'new' };
    const { error } = await db.insert('orders', [newOrder]);
    if (error) { showToast('Failed to create order'); console.error(error); return; }
    setOrders(prev => [newOrder, ...prev]);
    setShowNewOrder(false);
    showToast('Order created');
  }

  async function deleteOrder(id) {
    const { error } = await db.remove('orders', id);
    if (error) { showToast('Failed to delete'); console.error(error); return; }
    setOrders(prev => prev.filter(o => o.id !== id));
    setSelectedOrder(null);
    showToast('Order deleted');
  }

  const filteredOrders = useMemo(() => {
    return orders
      .filter(o => statusFilter === 'all' || o.status === statusFilter)
      .filter(o => {
        if (!search.trim()) return true;
        const q = search.toLowerCase();
        return o.client.toLowerCase().includes(q) || o.id.toLowerCase().includes(q) || o.service.toLowerCase().includes(q);
      })
      .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
  }, [orders, statusFilter, search]);

  const stats = useMemo(() => {
    const active = orders.filter(o => o.status !== 'delivered').length;
    const dueSoon = orders.filter(o => o.status !== 'delivered' && daysUntil(o.deadline) <= 2).length;
    const revenue = orders.filter(o => o.status === 'done' || o.status === 'delivered').reduce((s, o) => s + o.price, 0);
    const photos = orders.reduce((s, o) => s + o.photos, 0);
    return { active, dueSoon, revenue, photos };
  }, [orders]);

  const clients = useMemo(() => {
    const map = {};
    orders.forEach(o => {
      if (!map[o.client]) map[o.client] = { name: o.client, email: o.email, orders: [], totalSpent: 0 };
      map[o.client].orders.push(o);
      if (o.status === 'done' || o.status === 'delivered') map[o.client].totalSpent += o.price;
    });
    return Object.values(map).sort((a, b) => b.orders.length - a.orders.length);
  }, [orders]);

  return (
    <div style={S.app}>
      <style>{globalCSS}</style>
      <Sidebar view={view} setView={setView} />
      <main style={S.main}>
        <Topbar
          view={view}
          search={search}
          setSearch={setSearch}
          onNewOrder={() => setShowNewOrder(true)}
        />
        <div style={S.content}>
          {loading ? (
            <div style={S.emptyState}><p style={{ color: 'var(--muted)' }}>Loading orders...</p></div>
          ) : view === 'orders' ? (
            <>
              <StatsRow stats={stats} />
              <FilterBar statusFilter={statusFilter} setStatusFilter={setStatusFilter} orders={orders} />
              <OrdersTable orders={filteredOrders} onSelect={setSelectedOrder} onStatusChange={updateStatus} />
            </>
          ) : (
            <ClientsView clients={clients} />
          )}
        </div>
      </main>

      {selectedOrder && (
        <OrderDrawer
          order={selectedOrder}
          onClose={() => setSelectedOrder(null)}
          onStatusChange={updateStatus}
          onDelete={deleteOrder}
        />
      )}

      {showNewOrder && (
        <NewOrderModal onClose={() => setShowNewOrder(false)} onSave={addOrder} />
      )}

      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}

function Sidebar({ view, setView }) {
  return (
    <aside style={S.sidebar}>
      <div style={S.logo}>
        Prime<span style={{ color: 'var(--gold)' }}>.</span>Touch
      </div>
      <nav style={S.nav}>
        <SidebarItem active={view === 'orders'} onClick={() => setView('orders')} label="Orders" icon={<IconOrders />} />
        <SidebarItem active={view === 'clients'} onClick={() => setView('clients')} label="Clients" icon={<IconClients />} />
      </nav>
      <div style={S.sidebarFooter}>
        <div style={S.avatarCircle}>Y</div>
        <div>
          <div style={{ fontSize: 13, color: 'var(--text)' }}>Yên</div>
          <div style={{ fontSize: 11, color: 'var(--muted)' }}>Freelance editor</div>
        </div>
      </div>
    </aside>
  );
}

function SidebarItem({ active, onClick, label, icon }) {
  return (
    <button onClick={onClick} style={{ ...S.sidebarItem, ...(active ? S.sidebarItemActive : {}) }}>
      {icon}
      <span>{label}</span>
    </button>
  );
}

function Topbar({ view, search, setSearch, onNewOrder }) {
  return (
    <div style={S.topbar}>
      <div>
        <h1 style={S.pageTitle}>{view === 'orders' ? 'Orders' : 'Clients'}</h1>
        <p style={S.pageSub}>{view === 'orders' ? 'Track every project from request to delivery' : 'Everyone you\'ve worked with'}</p>
      </div>
      <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        {view === 'orders' && (
          <div style={S.searchBox}>
            <IconSearch />
            <input
              placeholder="Search orders, clients..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={S.searchInput}
            />
          </div>
        )}
        {view === 'orders' && (
          <button style={S.btnPrimary} onClick={onNewOrder}>
            <IconPlus /> New order
          </button>
        )}
      </div>
    </div>
  );
}

function StatsRow({ stats }) {
  return (
    <div style={S.statsRow}>
      <StatCard label="Active orders" value={stats.active} />
      <StatCard label="Due in 2 days" value={stats.dueSoon} accent={stats.dueSoon > 0} />
      <StatCard label="Revenue (completed)" value={`$${stats.revenue}`} />
      <StatCard label="Photos in pipeline" value={stats.photos} />
    </div>
  );
}

function StatCard({ label, value, accent }) {
  return (
    <div style={S.statCard}>
      <div style={{ ...S.statValue, color: accent ? '#E07856' : 'var(--text)' }}>{value}</div>
      <div style={S.statLabel}>{label}</div>
    </div>
  );
}

function FilterBar({ statusFilter, setStatusFilter, orders }) {
  const counts = { all: orders.length };
  Object.keys(STATUS).forEach(k => counts[k] = orders.filter(o => o.status === k).length);
  return (
    <div style={S.filterBar}>
      <FilterPill active={statusFilter === 'all'} onClick={() => setStatusFilter('all')} label="All" count={counts.all} />
      {Object.entries(STATUS).map(([key, s]) => (
        <FilterPill key={key} active={statusFilter === key} onClick={() => setStatusFilter(key)} label={s.label} count={counts[key]} color={s.color} />
      ))}
    </div>
  );
}

function FilterPill({ active, onClick, label, count, color }) {
  return (
    <button onClick={onClick} style={{ ...S.filterPill, ...(active ? S.filterPillActive : {}) }}>
      {color && <span style={{ width: 6, height: 6, borderRadius: '50%', background: color, display: 'inline-block', marginRight: 6 }} />}
      {label} <span style={{ opacity: 0.5, marginLeft: 4 }}>{count}</span>
    </button>
  );
}

function OrdersTable({ orders, onSelect, onStatusChange }) {
  if (orders.length === 0) {
    return (
      <div style={S.emptyState}>
        <div style={{ fontSize: 32, marginBottom: 12 }}>📭</div>
        <p style={{ color: 'var(--muted)', fontSize: 14 }}>No orders match this filter.</p>
      </div>
    );
  }
  return (
    <div style={S.tableWrap}>
      <table style={S.table}>
        <thead>
          <tr>
            <th style={S.th}>Order</th>
            <th style={S.th}>Client</th>
            <th style={S.th}>Service</th>
            <th style={S.th}>Photos</th>
            <th style={S.th}>Price</th>
            <th style={S.th}>Deadline</th>
            <th style={S.th}>Status</th>
          </tr>
        </thead>
        <tbody>
          {orders.map(o => (
            <OrderRow key={o.id} order={o} onSelect={onSelect} onStatusChange={onStatusChange} />
          ))}
        </tbody>
      </table>
    </div>
  );
}

function OrderRow({ order, onSelect, onStatusChange }) {
  const du = daysUntil(order.deadline);
  const urgent = du <= 1 && order.status !== 'delivered';
  return (
    <tr style={S.tr} onClick={() => onSelect(order)}>
      <td style={S.td}><span style={S.orderId}>{order.id}</span></td>
      <td style={S.td}>
        <div style={{ fontSize: 13, color: 'var(--text)' }}>{order.client}</div>
        <div style={{ fontSize: 11, color: 'var(--muted)' }}>{order.email}</div>
      </td>
      <td style={S.td}>{order.service}</td>
      <td style={S.td}>{order.photos}</td>
      <td style={S.td}>${order.price}</td>
      <td style={S.td}>
        <span style={{ color: urgent ? '#E07856' : 'var(--muted)' }}>
          {fmtDate(order.deadline)} {urgent && du >= 0 ? `(${du === 0 ? 'today' : '1 day'})` : urgent ? '(overdue)' : ''}
        </span>
      </td>
      <td style={S.td} onClick={e => e.stopPropagation()}>
        <StatusDropdown status={order.status} onChange={s => onStatusChange(order.id, s)} />
      </td>
    </tr>
  );
}

function StatusDropdown({ status, onChange }) {
  const [open, setOpen] = useState(false);
  const s = STATUS[status];
  return (
    <div style={{ position: 'relative' }}>
      <button
        onClick={() => setOpen(!open)}
        style={{ ...S.statusBadge, color: s.color, background: s.bg }}
      >
        {s.label} <IconChevron />
      </button>
      {open && (
        <>
          <div style={S.dropdownOverlay} onClick={() => setOpen(false)} />
          <div style={S.dropdown}>
            {Object.entries(STATUS).map(([key, st]) => (
              <button
                key={key}
                style={{ ...S.dropdownItem, color: st.color }}
                onClick={() => { onChange(key); setOpen(false); }}
              >
                {st.label}
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function OrderDrawer({ order, onClose, onStatusChange, onDelete }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const s = STATUS[order.status];
  const du = daysUntil(order.deadline);
  return (
    <>
      <div style={S.drawerOverlay} onClick={onClose} />
      <div style={S.drawer}>
        <div style={S.drawerHeader}>
          <div>
            <div style={S.orderId}>{order.id}</div>
            <h2 style={S.drawerTitle}>{order.client}</h2>
          </div>
          <button onClick={onClose} style={S.closeBtn}><IconClose /></button>
        </div>

        <div style={{ ...S.statusBadge, color: s.color, background: s.bg, display: 'inline-flex', marginBottom: 24 }}>
          {s.label}
        </div>

        <div style={S.drawerSection}>
          <DrawerField label="Email" value={order.email} />
          <DrawerField label="Service" value={order.service} />
          <DrawerField label="Photo count" value={order.photos} />
          <DrawerField label="Price" value={`$${order.price}`} />
          <DrawerField label="Created" value={fmtDate(order.created)} />
          <DrawerField
            label="Deadline"
            value={`${fmtDate(order.deadline)} ${du >= 0 ? `(in ${du}d)` : '(overdue)'}`}
            warn={du <= 1 && order.status !== 'delivered'}
          />
        </div>

        {order.notes && (
          <div style={S.drawerSection}>
            <div style={S.fieldLabel}>Notes</div>
            <p style={S.notesText}>{order.notes}</p>
          </div>
        )}

        <div style={S.fieldLabel}>Update status</div>
        <div style={S.statusGrid}>
          {Object.entries(STATUS).map(([key, st]) => (
            <button
              key={key}
              onClick={() => onStatusChange(order.id, key)}
              style={{
                ...S.statusGridBtn,
                borderColor: order.status === key ? st.color : 'var(--border)',
                color: order.status === key ? st.color : 'var(--muted)',
              }}
            >
              {st.label}
            </button>
          ))}
        </div>

        <div style={{ marginTop: 32, paddingTop: 20, borderTop: '1px solid var(--border)' }}>
          {!confirmDelete ? (
            <button style={S.deleteBtn} onClick={() => setConfirmDelete(true)}>Delete order</button>
          ) : (
            <div style={{ display: 'flex', gap: 8 }}>
              <button style={S.deleteBtnConfirm} onClick={() => onDelete(order.id)}>Confirm delete</button>
              <button style={S.cancelBtn} onClick={() => setConfirmDelete(false)}>Cancel</button>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

function DrawerField({ label, value, warn }) {
  return (
    <div style={S.drawerField}>
      <span style={S.fieldLabel}>{label}</span>
      <span style={{ fontSize: 13, color: warn ? '#E07856' : 'var(--text)' }}>{value}</span>
    </div>
  );
}

function NewOrderModal({ onClose, onSave }) {
  const [form, setForm] = useState({
    client: '', email: '', service: SERVICE_TYPES[0], photos: '', price: '', deadline: daysFromNow(3), notes: ''
  });

  function set(field, value) { setForm(prev => ({ ...prev, [field]: value })); }

  function submit() {
    if (!form.client.trim() || !form.email.trim()) return;
    onSave({ ...form, photos: Number(form.photos) || 0, price: Number(form.price) || 0 });
  }

  return (
    <>
      <div style={S.drawerOverlay} onClick={onClose} />
      <div style={S.modal}>
        <div style={S.drawerHeader}>
          <h2 style={S.drawerTitle}>New order</h2>
          <button onClick={onClose} style={S.closeBtn}><IconClose /></button>
        </div>

        <FormRow>
          <FormField label="Client name" value={form.client} onChange={v => set('client', v)} placeholder="Jane Doe" />
          <FormField label="Email" value={form.email} onChange={v => set('email', v)} placeholder="jane@example.com" />
        </FormRow>

        <FormField label="Service type" full>
          <select style={S.input} value={form.service} onChange={e => set('service', e.target.value)}>
            {SERVICE_TYPES.map(s => <option key={s}>{s}</option>)}
          </select>
        </FormField>

        <FormRow>
          <FormField label="Number of photos" value={form.photos} onChange={v => set('photos', v)} placeholder="20" type="number" />
          <FormField label="Price (USD)" value={form.price} onChange={v => set('price', v)} placeholder="100" type="number" />
        </FormRow>

        <FormField label="Deadline" value={form.deadline} onChange={v => set('deadline', v)} type="date" />

        <FormField label="Notes" full>
          <textarea
            style={{ ...S.input, minHeight: 80, resize: 'vertical' }}
            value={form.notes}
            onChange={e => set('notes', e.target.value)}
            placeholder="Style preferences, reference links, special instructions..."
          />
        </FormField>

        <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
          <button style={S.btnPrimary} onClick={submit}>Create order</button>
          <button style={S.cancelBtn} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </>
  );
}

function FormRow({ children }) {
  return <div style={{ display: 'flex', gap: 12 }}>{children}</div>;
}

function FormField({ label, value, onChange, placeholder, type = 'text', full, children }) {
  return (
    <div style={{ flex: full ? '1 1 100%' : 1, marginBottom: 16 }}>
      <label style={S.fieldLabel}>{label}</label>
      {children || (
        <input
          type={type}
          style={S.input}
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
        />
      )}
    </div>
  );
}

function ClientsView({ clients }) {
  if (clients.length === 0) {
    return <div style={S.emptyState}><p style={{ color: 'var(--muted)' }}>No clients yet.</p></div>;
  }
  return (
    <div style={S.clientsGrid}>
      {clients.map(c => (
        <div key={c.name} style={S.clientCard}>
          <div style={S.clientAvatar}>{c.name.split(' ').map(n => n[0]).join('').slice(0, 2)}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, color: 'var(--text)' }}>{c.name}</div>
            <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 8 }}>{c.email}</div>
            <div style={{ display: 'flex', gap: 16, fontSize: 12, color: 'var(--muted)' }}>
              <span>{c.orders.length} order{c.orders.length > 1 ? 's' : ''}</span>
              <span>${c.totalSpent} total</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}
