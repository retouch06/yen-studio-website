<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Touch — Admin</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0D0D0D; color: #F0EDE8; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #2a2a2a; }
input, textarea, select { background: #1a1a1a; border: 1px solid #2a2a2a; color: #F0EDE8; font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 12px; outline: none; transition: border-color 0.15s; border-radius: 0; }
input:focus, textarea:focus, select:focus { border-color: #C9A96E; }
input::placeholder, textarea::placeholder { color: #444; }
select option { background: #1a1a1a; }
button { cursor: pointer; font-family: 'Inter', sans-serif; }
</style>
</head>
<body>
<div id="root" style="width:100%;height:100%;display:flex;"></div>
<script type="text/babel">

const SUPABASE_URL = "https://lrkmmjcqsfyqiijwuwgb.supabase.co";
const SUPABASE_KEY = "sb_publishable_-ciMTY5GQVZa5VG1zGm4cQ_GJ-nO5Dg";
const ADMIN_PASSWORD = "primetouch2026";
const CLIENT_PORTAL_URL = window.location.origin + "/client.html";

const db = {
  async select(table, query = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    return r.json();
  },
  async insert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(data)
    });
    return r.json();
  },
  async update(table, id, data) {
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(data)
    });
  },
  async remove(table, id) {
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
  },
  async uploadFile(bucket, path, file) {
    const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': file.type },
      body: file
    });
    if (!r.ok) throw new Error('Upload failed');
    return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
  }
};

const STATUS = ['new','in_progress','review','done','delivered'];
const STATUS_LABEL = { new:'New', in_progress:'In progress', review:'Review', done:'Done', delivered:'Delivered' };
const STATUS_COLOR = { new:'#555', in_progress:'#C9A96E', review:'#7EB8D4', done:'#6DBE8C', delivered:'#6DBE8C' };

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function genToken() { return Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2); }

function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}

function App() {
  const [auth, setAuth] = React.useState(() => sessionStorage.getItem('ptAuth') === '1');
  const [pw, setPw] = React.useState('');
  const [pwErr, setPwErr] = React.useState(false);
  const [orders, setOrders] = React.useState([]);
  const [deliveries, setDeliveries] = React.useState([]);
  const [clients, setClients] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState('orders');
  const [search, setSearch] = React.useState('');
  const [filterStatus, setFilterStatus] = React.useState('all');
  const [selected, setSelected] = React.useState(null);
  const [showNewOrder, setShowNewOrder] = React.useState(false);
  const [showDelivery, setShowDelivery] = React.useState(null);
  const [copiedLink, setCopiedLink] = React.useState('');
  const [uploadingFor, setUploadingFor] = React.useState(null);
  const [uploadProgress, setUploadProgress] = React.useState('');

  React.useEffect(() => { if (auth) loadAll(); }, [auth]);

  async function loadAll() {
    setLoading(true);
    const [ords, dels, cls] = await Promise.all([
      db.select('orders', '?order=inserted_at.desc'),
      db.select('deliveries', '?order=created_at.desc'),
      db.select('clients', '?order=created_at.desc')
    ]);
    if (!ords.error) setOrders(Array.isArray(ords) ? ords : []);
    if (!dels.error) setDeliveries(Array.isArray(dels) ? dels : []);
    if (!cls.error) setClients(Array.isArray(cls) ? cls : []);
    setLoading(false);
    if (!ords.error && Array.isArray(ords) && ords.length === 0) {
      const sample = [
        { id: genId(), client: 'Sarah Chen', email: 'sarah@example.com', service: 'Portrait Retouching', photos: 12, price: 60, status: 'in_progress', deadline: new Date(Date.now()+2*86400000).toISOString().slice(0,10), created: new Date().toISOString().slice(0,10), notes: 'Natural skin tones, remove blemishes' },
        { id: genId(), client: 'Marcus Webb', email: 'marcus@studio.com', service: 'Product Photography', photos: 30, price: 150, status: 'new', deadline: new Date(Date.now()+5*86400000).toISOString().slice(0,10), created: new Date().toISOString().slice(0,10), notes: 'White background, jewelry collection' },
        { id: genId(), client: 'Linh Nguyen', email: 'linh@brand.vn', service: 'Fashion Editorial', photos: 45, price: 225, status: 'review', deadline: new Date(Date.now()+1*86400000).toISOString().slice(0,10), created: new Date().toISOString().slice(0,10), notes: '' },
        { id: genId(), client: 'Emma Rossi', email: 'emma@moda.it', service: 'Product Photography', photos: 20, price: 100, status: 'done', deadline: new Date(Date.now()-1*86400000).toISOString().slice(0,10), created: new Date().toISOString().slice(0,10), notes: 'Luxury watches' },
        { id: genId(), client: 'David Park', email: 'dpark@agency.com', service: 'Portrait Retouching', photos: 8, price: 40, status: 'delivered', deadline: new Date(Date.now()-3*86400000).toISOString().slice(0,10), created: new Date().toISOString().slice(0,10), notes: '' }
      ];
      await Promise.all(sample.map(o => db.insert('orders', o)));
      setOrders(sample);
    }
  }

  function tryLogin() {
    if (pw === ADMIN_PASSWORD) { sessionStorage.setItem('ptAuth','1'); setAuth(true); }
    else { setPwErr(true); setPw(''); setTimeout(() => setPwErr(false), 1500); }
  }

  async function createOrder(data) {
    const newOrder = { ...data, id: genId(), inserted_at: new Date().toISOString() };
    await db.insert('orders', newOrder);
    setOrders(prev => [newOrder, ...prev]);
    setShowNewOrder(false);
  }

  async function updateOrder(id, patch) {
    await db.update('orders', id, patch);
    setOrders(prev => prev.map(o => o.id === id ? { ...o, ...patch } : o));
    if (selected && selected.id === id) setSelected(prev => ({ ...prev, ...patch }));
  }

  async function deleteOrder(id) {
    await db.remove('orders', id);
    setOrders(prev => prev.filter(o => o.id !== id));
    setSelected(null);
  }

  async function createDelivery(orderId, expiryDays) {
    const token = genToken();
    const expires = new Date(Date.now() + expiryDays * 86400000).toISOString();
    const newDel = { id: genId(), order_id: orderId, token, files: [], expires_at: expires, download_count: 0 };
    await db.insert('deliveries', newDel);
    setDeliveries(prev => [newDel, ...prev]);
    return newDel;
  }

  async function uploadFilesToDelivery(deliveryId, files) {
    setUploadProgress('Uploading...');
    const existing = deliveries.find(d => d.id === deliveryId);
    const existingFiles = existing ? (existing.files || []) : [];
    const newFiles = [];
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      setUploadProgress(`Uploading ${i+1}/${files.length}: ${f.name}`);
      try {
        const path = `${deliveryId}/${Date.now()}-${f.name}`;
        const url = await db.uploadFile('deliveries', path, f);
        newFiles.push({ name: f.name, url, size: f.size });
      } catch(e) { console.error('Upload error', e); }
    }
    const allFiles = [...existingFiles, ...newFiles];
    await db.update('deliveries', deliveryId, { files: allFiles });
    setDeliveries(prev => prev.map(d => d.id === deliveryId ? { ...d, files: allFiles } : d));
    setUploadProgress('');
    return allFiles;
  }

  async function removeFileFromDelivery(deliveryId, fileIdx) {
    const del = deliveries.find(d => d.id === deliveryId);
    if (!del) return;
    const newFiles = del.files.filter((_, i) => i !== fileIdx);
    await db.update('deliveries', deliveryId, { files: newFiles });
    setDeliveries(prev => prev.map(d => d.id === deliveryId ? { ...d, files: newFiles } : d));
  }

  function copyLink(token) {
    const link = `${CLIENT_PORTAL_URL}?token=${token}`;
    navigator.clipboard.writeText(link);
    setCopiedLink(token);
    setTimeout(() => setCopiedLink(''), 2000);
  }

  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    const matchSearch = !q || o.client?.toLowerCase().includes(q) || o.email?.toLowerCase().includes(q) || o.service?.toLowerCase().includes(q) || o.id?.includes(q);
    const matchStatus = filterStatus === 'all' || o.status === filterStatus;
    return matchSearch && matchStatus;
  });

  const stats = {
    active: orders.filter(o => ['new','in_progress','review'].includes(o.status)).length,
    urgent: orders.filter(o => { const d = daysUntil(o.deadline); return d !== null && d <= 2 && !['done','delivered'].includes(o.status); }).length,
    revenue: orders.filter(o => ['done','delivered'].includes(o.status)).reduce((s,o) => s + (Number(o.price)||0), 0),
    photos: orders.filter(o => ['in_progress','review'].includes(o.status)).reduce((s,o) => s + (Number(o.photos)||0), 0)
  };

  const clientMap = {};
  orders.forEach(o => {
    if (!clientMap[o.email]) clientMap[o.email] = { email: o.email, name: o.client, orders: 0, total: 0, lastOrder: o.inserted_at };
    clientMap[o.email].orders++;
    clientMap[o.email].total += Number(o.price) || 0;
    if (o.inserted_at > clientMap[o.email].lastOrder) clientMap[o.email].lastOrder = o.inserted_at;
  });
  const clientList = Object.values(clientMap).sort((a,b) => b.total - a.total);

  if (!auth) return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 32 }}>
      <div style={{ fontFamily: 'Playfair Display', fontSize: 28, color: '#F0EDE8', letterSpacing: '0.05em' }}>Prime Touch</div>
      <div style={{ background: '#111', padding: '32px 40px', width: 320 }}>
        <div style={{ fontSize: 13, color: '#888', marginBottom: 20, textAlign: 'center', letterSpacing: '0.06em', textTransform: 'uppercase' }}>Admin access</div>
        <input type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key === 'Enter' && tryLogin()} placeholder="Password" style={{ width: '100%', marginBottom: 12, border: pwErr ? '1px solid #E07070' : '1px solid #2a2a2a', transition: 'border-color 0.2s' }} autoFocus />
        {pwErr && <div style={{ color: '#E07070', fontSize: 12, marginBottom: 10, textAlign: 'center' }}>Incorrect password</div>}
        <button onClick={tryLogin} style={{ width: '100%', background: '#C9A96E', border: 'none', color: '#0D0D0D', padding: '11px', fontSize: 13, fontWeight: 500, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Enter</button>
      </div>
    </div>
  );

  return (
    <div style={{ display: 'flex', height: '100vh', width: '100%' }}>
      {/* Sidebar */}
      <div style={{ width: 200, background: '#0a0a0a', borderRight: '1px solid #1a1a1a', display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        <div style={{ padding: '24px 20px 20px', borderBottom: '1px solid #1a1a1a' }}>
          <div style={{ fontFamily: 'Playfair Display', fontSize: 18, color: '#F0EDE8', letterSpacing: '0.05em' }}>Prime Touch</div>
          <div style={{ fontSize: 10, color: '#333', marginTop: 4, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Admin</div>
        </div>
        <nav style={{ padding: '12px 10px', flex: 1 }}>
          {[['orders','Orders',stats.active],['clients','Clients',null],['deliveries','Deliveries',null]].map(([id,label,badge]) => (
            <button key={id} onClick={() => { setTab(id); setSelected(null); }} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', padding: '9px 10px', background: tab === id ? '#161616' : 'none', border: 'none', color: tab === id ? '#F0EDE8' : '#555', fontSize: 13, textAlign: 'left', marginBottom: 2, letterSpacing: '0.02em', transition: 'color 0.15s' }}>
              {label}
              {badge > 0 && <span style={{ background: '#C9A96E', color: '#0D0D0D', fontSize: 10, fontWeight: 600, padding: '2px 6px', borderRadius: 10 }}>{badge}</span>}
            </button>
          ))}
        </nav>
        <div style={{ padding: '16px 20px', borderTop: '1px solid #1a1a1a' }}>
          <button onClick={() => { sessionStorage.removeItem('ptAuth'); setAuth(false); }} style={{ background: 'none', border: 'none', color: '#333', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', cursor: 'pointer' }}>Sign out</button>
        </div>
      </div>

      {/* Main */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Header */}
        <div style={{ padding: '20px 28px', borderBottom: '1px solid #1a1a1a', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <div style={{ fontSize: 16, fontWeight: 500 }}>{tab === 'orders' ? 'Orders' : tab === 'clients' ? 'Clients' : 'Deliveries'}</div>
          </div>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            {tab === 'orders' && (
              <>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{ width: 220, fontSize: 13 }} />
                <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ fontSize: 13, paddingRight: 28 }}>
                  <option value="all">All status</option>
                  {STATUS.map(s => <option key={s} value={s}>{STATUS_LABEL[s]}</option>)}
                </select>
                <button onClick={() => setShowNewOrder(true)} style={{ background: '#C9A96E', border: 'none', color: '#0D0D0D', padding: '9px 18px', fontSize: 12, fontWeight: 500, letterSpacing: '0.07em', textTransform: 'uppercase' }}>+ New order</button>
              </>
            )}
          </div>
        </div>

        {/* Stats bar (orders tab only) */}
        {tab === 'orders' && (
          <div style={{ display: 'flex', gap: 1, padding: '0', flexShrink: 0, borderBottom: '1px solid #1a1a1a' }}>
            {[
              ['Active orders', stats.active, '#C9A96E'],
              ['Due ≤2 days', stats.urgent, stats.urgent > 0 ? '#E07070' : '#555'],
              ['Revenue (done)', `$${stats.revenue}`, '#6DBE8C'],
              ['Photos in queue', stats.photos, '#7EB8D4']
            ].map(([label, val, color]) => (
              <div key={label} style={{ flex: 1, padding: '14px 20px', background: '#0f0f0f' }}>
                <div style={{ fontSize: 10, color: '#444', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 5 }}>{label}</div>
                <div style={{ fontSize: 22, fontWeight: 500, color }}>{val}</div>
              </div>
            ))}
          </div>
        )}

        {loading ? (
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#444', fontSize: 13 }}>Loading...</div>
        ) : (
          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
            {/* Orders tab */}
            {tab === 'orders' && (
              <>
                <div style={{ flex: 1, overflowY: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                    <thead>
                      <tr style={{ borderBottom: '1px solid #1a1a1a' }}>
                        {['Client','Service','Photos','Price','Status','Deadline',''].map(h => (
                          <th key={h} style={{ padding: '10px 16px', color: '#444', fontWeight: 400, textAlign: 'left', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map(o => {
                        const days = daysUntil(o.deadline);
                        const isUrgent = days !== null && days <= 2 && !['done','delivered'].includes(o.status);
                        const hasDel = deliveries.some(d => d.order_id === o.id);
                        return (
                          <tr key={o.id} onClick={() => setSelected(o)} style={{ borderBottom: '1px solid #111', background: selected?.id === o.id ? '#161616' : 'transparent', cursor: 'pointer', transition: 'background 0.1s' }}
                            onMouseEnter={e => { if (selected?.id !== o.id) e.currentTarget.style.background = '#0f0f0f'; }}
                            onMouseLeave={e => { if (selected?.id !== o.id) e.currentTarget.style.background = 'transparent'; }}>
                            <td style={{ padding: '12px 16px' }}>
                              <div style={{ fontWeight: 500 }}>{o.client}</div>
                              <div style={{ color: '#444', fontSize: 11, marginTop: 2 }}>{o.email}</div>
                            </td>
                            <td style={{ padding: '12px 16px', color: '#888' }}>{o.service}</td>
                            <td style={{ padding: '12px 16px', color: '#888' }}>{o.photos}</td>
                            <td style={{ padding: '12px 16px', color: '#888' }}>${o.price || 0}</td>
                            <td style={{ padding: '12px 16px' }}>
                              <span style={{ color: STATUS_COLOR[o.status], fontSize: 12, fontWeight: 500 }}>{STATUS_LABEL[o.status]}</span>
                            </td>
                            <td style={{ padding: '12px 16px', color: isUrgent ? '#E07070' : '#888', fontWeight: isUrgent ? 500 : 400 }}>
                              {o.deadline ? (days === null ? o.deadline : days < 0 ? `${Math.abs(days)}d overdue` : days === 0 ? 'Today' : `${days}d`) : '—'}
                            </td>
                            <td style={{ padding: '12px 16px' }}>
                              {hasDel && <span style={{ fontSize: 10, color: '#6DBE8C', letterSpacing: '0.06em', textTransform: 'uppercase', background: 'rgba(109,190,140,0.1)', padding: '3px 8px' }}>Delivered</span>}
                            </td>
                          </tr>
                        );
                      })}
                      {filtered.length === 0 && (
                        <tr><td colSpan={7} style={{ padding: '60px', textAlign: 'center', color: '#333', fontSize: 13 }}>No orders found</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>

                {/* Order detail panel */}
                {selected && (
                  <OrderPanel order={selected} deliveries={deliveries} onUpdate={updateOrder} onDelete={deleteOrder} onClose={() => setSelected(null)} onCreateDelivery={createDelivery} onUploadFiles={uploadFilesToDelivery} onRemoveFile={removeFileFromDelivery} onCopyLink={copyLink} copiedLink={copiedLink} uploadProgress={uploadProgress} clientPortalUrl={CLIENT_PORTAL_URL} />
                )}
              </>
            )}

            {/* Clients tab */}
            {tab === 'clients' && (
              <div style={{ flex: 1, overflowY: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid #1a1a1a' }}>
                      {['Client','Email','Orders','Total spent','Portal account'].map(h => (
                        <th key={h} style={{ padding: '10px 16px', color: '#444', fontWeight: 400, textAlign: 'left', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {clientList.map(c => {
                      const hasAccount = clients.some(cl => cl.email === c.email);
                      return (
                        <tr key={c.email} style={{ borderBottom: '1px solid #111' }}>
                          <td style={{ padding: '12px 16px', fontWeight: 500 }}>{c.name}</td>
                          <td style={{ padding: '12px 16px', color: '#888' }}>{c.email}</td>
                          <td style={{ padding: '12px 16px', color: '#888' }}>{c.orders}</td>
                          <td style={{ padding: '12px 16px', color: '#C9A96E', fontWeight: 500 }}>${c.total}</td>
                          <td style={{ padding: '12px 16px' }}>
                            {hasAccount ? <span style={{ color: '#6DBE8C', fontSize: 12 }}>✓ Active</span> : <span style={{ color: '#333', fontSize: 12 }}>No account</span>}
                          </td>
                        </tr>
                      );
                    })}
                    {clientList.length === 0 && (
                      <tr><td colSpan={5} style={{ padding: '60px', textAlign: 'center', color: '#333', fontSize: 13 }}>No clients yet</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            )}

            {/* Deliveries tab */}
            {tab === 'deliveries' && (
              <div style={{ flex: 1, overflowY: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid #1a1a1a' }}>
                      {['Order / Client','Files','Downloads','Expires','Link'].map(h => (
                        <th key={h} style={{ padding: '10px 16px', color: '#444', fontWeight: 400, textAlign: 'left', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {deliveries.map(d => {
                      const order = orders.find(o => o.id === d.order_id);
                      const days = d.expires_at ? daysUntil(d.expires_at) : null;
                      const link = `${CLIENT_PORTAL_URL}?token=${d.token}`;
                      return (
                        <tr key={d.id} style={{ borderBottom: '1px solid #111' }}>
                          <td style={{ padding: '12px 16px' }}>
                            <div style={{ fontWeight: 500 }}>{order ? order.client : '—'}</div>
                            <div style={{ color: '#444', fontSize: 11, marginTop: 2 }}>{order ? order.service : d.order_id}</div>
                          </td>
                          <td style={{ padding: '12px 16px', color: '#888' }}>{(d.files || []).length} files</td>
                          <td style={{ padding: '12px 16px', color: '#888' }}>{d.download_count || 0}</td>
                          <td style={{ padding: '12px 16px', color: days !== null && days <= 2 ? '#E07070' : '#888' }}>
                            {days === null ? '∞' : days < 0 ? 'Expired' : `${days}d`}
                          </td>
                          <td style={{ padding: '12px 16px' }}>
                            <button onClick={() => { navigator.clipboard.writeText(link); setCopiedLink(d.token); setTimeout(() => setCopiedLink(''), 2000); }} style={{ background: copiedLink === d.token ? 'rgba(109,190,140,0.1)' : 'none', border: `1px solid ${copiedLink === d.token ? '#6DBE8C' : '#2a2a2a'}`, color: copiedLink === d.token ? '#6DBE8C' : '#888', padding: '6px 12px', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', transition: 'all 0.2s' }}>
                              {copiedLink === d.token ? '✓ Copied' : 'Copy link'}
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                    {deliveries.length === 0 && (
                      <tr><td colSpan={5} style={{ padding: '60px', textAlign: 'center', color: '#333', fontSize: 13 }}>No deliveries yet. Create one from an order.</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>

      {showNewOrder && <NewOrderModal onCreate={createOrder} onClose={() => setShowNewOrder(false)} />}
    </div>
  );
}

function OrderPanel({ order, deliveries, onUpdate, onDelete, onClose, onCreateDelivery, onUploadFiles, onRemoveFile, onCopyLink, copiedLink, uploadProgress, clientPortalUrl }) {
  const [editing, setEditing] = React.useState(false);
  const [form, setForm] = React.useState({ ...order });
  const [creatingDelivery, setCreatingDelivery] = React.useState(false);
  const [expiryDays, setExpiryDays] = React.useState(7);
  const [generating, setGenerating] = React.useState(false);
  const fileRef = React.useRef();

  const del = deliveries.find(d => d.order_id === order.id);
  const deliveryLink = del ? `${clientPortalUrl}?token=${del.token}` : null;

  React.useEffect(() => { setForm({ ...order }); setEditing(false); }, [order.id]);

  async function save() {
    await onUpdate(order.id, form);
    setEditing(false);
  }

  async function handleGenerate() {
    setGenerating(true);
    await onCreateDelivery(order.id, expiryDays);
    setGenerating(false);
    setCreatingDelivery(false);
  }

  async function handleFileUpload(e) {
    const files = Array.from(e.target.files);
    if (!files.length || !del) return;
    await onUploadFiles(del.id, files);
    e.target.value = '';
  }

  const days = order.deadline ? Math.ceil((new Date(order.deadline) - new Date()) / 86400000) : null;

  return (
    <div style={{ width: 340, borderLeft: '1px solid #1a1a1a', display: 'flex', flexDirection: 'column', overflowY: 'auto', background: '#0a0a0a', flexShrink: 0 }}>
      <div style={{ padding: '16px 20px', borderBottom: '1px solid #1a1a1a', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontSize: 13, fontWeight: 500 }}>Order detail</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {!editing && <button onClick={() => setEditing(true)} style={{ background: 'none', border: '1px solid #2a2a2a', color: '#888', padding: '5px 12px', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Edit</button>}
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#555', fontSize: 18, lineHeight: 1 }}>×</button>
        </div>
      </div>

      <div style={{ padding: '20px', flex: 1 }}>
        {editing ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {[['client','Client name'],['email','Email'],['service','Service'],['photos','Photos (count)'],['price','Price ($)'],['deadline','Deadline']].map(([key,label]) => (
              <div key={key}>
                <div style={{ fontSize: 10, color: '#444', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>{label}</div>
                <input value={form[key] || ''} onChange={e => setForm(p => ({...p, [key]: e.target.value}))} type={key === 'deadline' ? 'date' : key === 'photos' || key === 'price' ? 'number' : 'text'} style={{ width: '100%' }} />
              </div>
            ))}
            <div>
              <div style={{ fontSize: 10, color: '#444', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>Status</div>
              <select value={form.status} onChange={e => setForm(p => ({...p, status: e.target.value}))} style={{ width: '100%' }}>
                {['new','in_progress','review','done','delivered'].map(s => <option key={s} value={s}>{STATUS_LABEL[s]}</option>)}
              </select>
            </div>
            <div>
              <div style={{ fontSize: 10, color: '#444', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>Notes</div>
              <textarea value={form.notes || ''} onChange={e => setForm(p => ({...p, notes: e.target.value}))} style={{ width: '100%', height: 72, resize: 'none' }} />
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
              <button onClick={save} style={{ flex: 1, background: '#C9A96E', border: 'none', color: '#0D0D0D', padding: '9px', fontSize: 12, fontWeight: 500, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Save</button>
              <button onClick={() => { setEditing(false); setForm({...order}); }} style={{ flex: 1, background: 'none', border: '1px solid #2a2a2a', color: '#888', padding: '9px', fontSize: 12, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Cancel</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontWeight: 500, fontSize: 16, marginBottom: 4 }}>{order.client}</div>
              <div style={{ color: '#555', fontSize: 13 }}>{order.email}</div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px 16px', marginBottom: 20 }}>
              {[['Service', order.service], ['Photos', order.photos], ['Price', `$${order.price||0}`], ['Status', STATUS_LABEL[order.status]], ['Deadline', days === null ? (order.deadline || '—') : days < 0 ? `${Math.abs(days)}d overdue` : days === 0 ? 'Today!' : `${days} days`], ['Order ID', `#${order.id?.slice(0,8).toUpperCase()}`]].map(([label, val]) => (
                <div key={label}>
                  <div style={{ fontSize: 10, color: '#444', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 3 }}>{label}</div>
                  <div style={{ fontSize: 13, color: label === 'Status' ? (STATUS_COLOR[order.status] || '#F0EDE8') : label === 'Deadline' && days !== null && days <= 2 ? '#E07070' : '#F0EDE8', fontWeight: label === 'Status' ? 500 : 400 }}>{val}</div>
                </div>
              ))}
            </div>
            {order.notes && (
              <div style={{ background: '#111', padding: '12px', borderLeft: '2px solid #2a2a2a', marginBottom: 20 }}>
                <div style={{ fontSize: 10, color: '#444', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Notes</div>
                <div style={{ color: '#888', fontSize: 13, lineHeight: 1.6 }}>{order.notes}</div>
              </div>
            )}

            {/* Delivery section */}
            <div style={{ borderTop: '1px solid #1a1a1a', paddingTop: 20, marginTop: 4 }}>
              <div style={{ fontSize: 11, color: '#444', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 14 }}>Delivery</div>
              {!del ? (
                creatingDelivery ? (
                  <div>
                    <div style={{ fontSize: 12, color: '#888', marginBottom: 8 }}>Link expires after:</div>
                    <select value={expiryDays} onChange={e => setExpiryDays(Number(e.target.value))} style={{ width: '100%', marginBottom: 12 }}>
                      <option value={3}>3 days</option>
                      <option value={7}>7 days</option>
                      <option value={14}>14 days</option>
                      <option value={30}>30 days</option>
                    </select>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button onClick={handleGenerate} disabled={generating} style={{ flex: 1, background: '#C9A96E', border: 'none', color: '#0D0D0D', padding: '9px', fontSize: 11, fontWeight: 500, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
                        {generating ? 'Creating...' : 'Create link'}
                      </button>
                      <button onClick={() => setCreatingDelivery(false)} style={{ flex: 1, background: 'none', border: '1px solid #2a2a2a', color: '#888', padding: '9px', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <button onClick={() => setCreatingDelivery(true)} style={{ width: '100%', background: 'none', border: '1px solid #C9A96E', color: '#C9A96E', padding: '10px', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', transition: 'background 0.2s' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'rgba(201,169,110,0.08)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'none'}>
                    + Create delivery link
                  </button>
                )
              ) : (
                <div>
                  <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
                    <button onClick={() => onCopyLink(del.token)} style={{ flex: 1, background: copiedLink === del.token ? 'rgba(109,190,140,0.1)' : 'none', border: `1px solid ${copiedLink === del.token ? '#6DBE8C' : '#2a2a2a'}`, color: copiedLink === del.token ? '#6DBE8C' : '#888', padding: '9px', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', transition: 'all 0.2s' }}>
                      {copiedLink === del.token ? '✓ Link copied' : 'Copy client link'}
                    </button>
                    <a href={deliveryLink} target="_blank" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: '1px solid #2a2a2a', color: '#888', padding: '9px 12px', textDecoration: 'none', fontSize: 14 }}>↗</a>
                  </div>

                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
                    <div style={{ fontSize: 12, color: '#555' }}>{(del.files||[]).length} files uploaded</div>
                    <button onClick={() => fileRef.current?.click()} style={{ background: '#C9A96E', border: 'none', color: '#0D0D0D', padding: '5px 12px', fontSize: 11, fontWeight: 500, letterSpacing: '0.06em', textTransform: 'uppercase' }}>+ Upload</button>
                    <input ref={fileRef} type="file" multiple accept="image/*,.jpg,.jpeg,.png,.raw,.tif,.tiff,.psd,.zip" onChange={handleFileUpload} style={{ display: 'none' }} />
                  </div>

                  {uploadProgress && (
                    <div style={{ background: '#111', padding: '8px 12px', fontSize: 11, color: '#C9A96E', marginBottom: 8 }}>{uploadProgress}</div>
                  )}

                  {(del.files||[]).length > 0 && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      {del.files.map((f, i) => (
                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#111', padding: '7px 10px' }}>
                          <div style={{ flex: 1, fontSize: 11, color: '#888', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</div>
                          <button onClick={() => onRemoveFile(del.id, i)} style={{ background: 'none', border: 'none', color: '#444', fontSize: 14, cursor: 'pointer', lineHeight: 1, flexShrink: 0 }} title="Remove">×</button>
                        </div>
                      ))}
                    </div>
                  )}

                  <div style={{ display: 'flex', gap: 12, marginTop: 12, fontSize: 11, color: '#444' }}>
                    <span>{del.download_count || 0} downloads</span>
                    {del.expires_at && <span>Exp: {new Date(del.expires_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' })}</span>}
                  </div>
                </div>
              )}
            </div>

            <div style={{ borderTop: '1px solid #1a1a1a', paddingTop: 16, marginTop: 16 }}>
              <div style={{ fontSize: 10, color: '#444', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 10 }}>Move status</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {STATUS.map(s => (
                  <button key={s} onClick={() => onUpdate(order.id, { status: s })} style={{ padding: '5px 10px', fontSize: 11, background: order.status === s ? STATUS_COLOR[s] : 'none', border: `1px solid ${order.status === s ? STATUS_COLOR[s] : '#2a2a2a'}`, color: order.status === s ? '#0D0D0D' : '#555', letterSpacing: '0.04em', transition: 'all 0.15s' }}>
                    {STATUS_LABEL[s]}
                  </button>
                ))}
              </div>
            </div>

            <button onClick={() => { if (window.confirm('Delete this order?')) onDelete(order.id); }} style={{ marginTop: 20, width: '100%', background: 'none', border: '1px solid rgba(220,60,60,0.3)', color: 'rgba(220,60,60,0.6)', padding: '8px', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', transition: 'all 0.15s' }}
              onMouseEnter={e => { e.currentTarget.style.background = 'rgba(220,60,60,0.05)'; e.currentTarget.style.borderColor = 'rgba(220,60,60,0.5)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'none'; e.currentTarget.style.borderColor = 'rgba(220,60,60,0.3)'; }}>
              Delete order
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function NewOrderModal({ onCreate, onClose }) {
  const [form, setForm] = React.useState({ client:'', email:'', service:'Product Photography', photos:'', price:'', deadline:'', notes:'', status:'new', created: new Date().toISOString().slice(0,10) });

  function handleCreate() {
    if (!form.client || !form.email) return;
    onCreate({ ...form, photos: Number(form.photos)||0, price: Number(form.price)||0 });
  }

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50 }}>
      <div style={{ background: '#111', width: 460, padding: '28px 32px', maxHeight: '90vh', overflowY: 'auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <div style={{ fontSize: 15, fontWeight: 500 }}>New order</div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#555', fontSize: 20, cursor: 'pointer' }}>×</button>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {[['client','Client name *',false],['email','Email *',false],['service','Service',false],['photos','Number of photos','number'],['price','Price ($)','number'],['deadline','Deadline','date']].map(([key,label,type]) => (
            <div key={key}>
              <div style={{ fontSize: 11, color: '#444', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 5 }}>{label}</div>
              {key === 'service' ? (
                <select value={form[key]} onChange={e => setForm(p => ({...p, [key]: e.target.value}))} style={{ width: '100%' }}>
                  {['Product Photography','Portrait Retouching','Fashion Editorial','Jewelry Retouching','E-commerce Batch','Other'].map(s => <option key={s}>{s}</option>)}
                </select>
              ) : (
                <input value={form[key]} onChange={e => setForm(p => ({...p, [key]: e.target.value}))} type={type || 'text'} style={{ width: '100%' }} />
              )}
            </div>
          ))}
          <div>
            <div style={{ fontSize: 11, color: '#444', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 5 }}>Notes</div>
            <textarea value={form.notes} onChange={e => setForm(p => ({...p, notes: e.target.value}))} style={{ width: '100%', height: 72, resize: 'none' }} />
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
          <button onClick={handleCreate} style={{ flex: 1, background: '#C9A96E', border: 'none', color: '#0D0D0D', padding: '11px', fontSize: 12, fontWeight: 500, letterSpacing: '0.07em', textTransform: 'uppercase' }}>Create order</button>
          <button onClick={onClose} style={{ flex: 1, background: 'none', border: '1px solid #2a2a2a', color: '#888', padding: '11px', fontSize: 12, letterSpacing: '0.07em', textTransform: 'uppercase' }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
